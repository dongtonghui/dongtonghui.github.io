171|  const OVERVIEW = qp || window.DECK_OVERVIEW || ((new Date().getSeconds() % 5 < 2) ? 'gallery' : 'grid');

174|  function setMode(mode) {
175|    document.body.setAttribute('data-mode', mode);
176|    if (mode === 'present') { fit(); show(current); }
177|    else { requestAnimationFrame(buildOverview); }

180|  /* ─ 媒体（缩略图优先，否则 iframe） ─ */
181|  function makeCard(idx, useScale, useImg) {
182|    const card = document.createElement('div');
183|    card.className = 'card'; card.dataset.idx = idx;
184|    const item = deck[idx];
185|    if (useImg && item.thumb) {
186|      // 仅画廊用：预渲染缩略图，扛无限平铺的性能
187|      const im = document.createElement('img');
188|      im.className = 'thumb-img'; im.src = item.thumb; im.decoding = 'async';
189|      card.appendChild(im);
190|    } else {
191|      // 网格默认用：真实 HTML 子页面（清晰、所见即所得）
192|      const thumb = document.createElement('div');
193|      thumb.className = 'thumb';
194|      if (useScale != null) thumb.style.transform = 'scale(' + useScale + ')';
195|      const ifr = document.createElement('iframe');
196|      ifr.src = item.file; ifr.setAttribute('scrolling', 'no');

212|  /* ════════ 网格墙（自适应） ════════ */
213|  function buildGrid() {
214|    const n = deck.length; if (!n) return;
215|    wall.innerHTML = '';
216|    for (let i = 0; i < n; i++) wall.appendChild(makeCard(i, null, false));  // 网格 = iframe 真页面

219|  const GRID_PAD = 74;  // #ov-grid scroll 顶部 padding，算动态 transform-origin 用
220|  function layoutWall() {
221|    const n = deck.length; if (!n) return;
222|    const vw = innerWidth, vh = innerHeight, gap = 26;
223|    const availW = vw * 0.86;                                   // 留 rotateZ 横向余量（强对角也不裁切）
224|    const target = 280;
225|    let cols = Math.max(3, Math.min(9, Math.floor((availW + gap) / (target + gap))));
226|    cols = Math.min(cols, n);
227|    const rows = Math.ceil(n / cols);
228|    const cardW = Math.min(target + 40, (availW - (cols - 1) * gap) / cols);
229|    const cardH = cardW * 9 / 16;
230|    const baseW = cols * cardW + (cols - 1) * gap;
231|    const wallH = rows * cardH + (rows - 1) * gap;
232|    wall.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
233|    wall.style.gap = gap + 'px';
234|    wall.style.width = baseW + 'px';
235|    // 单平面(无 preserve-3d)→任意角度都不重叠、可点；fit 与 scroll 都给强对角倾斜
236|    if (wallH <= vh * 0.80) {
237|      document.body.setAttribute('data-grid', 'fit');
238|      const rx = Math.max(11, Math.min(15, 15 - (rows - 2) * 1.1));
239|      const rz = Math.max(8, Math.min(11, 11 - (rows - 2) * 0.7));
240|      wall.style.setProperty('--rx', rx); wall.style.setProperty('--rz', rz);
241|      wall.style.transformOrigin = 'center center';
242|      const tilt = 'rotateX(' + rx + 'deg) rotateZ(-' + rz + 'deg)';
243|      wall.style.transform = tilt;
244|      const r = wall.getBoundingClientRect();
245|      let s = Math.min(vw * 0.92 / r.width, vh * 0.80 / r.height);
246|      s = Math.max(0.6, Math.min(s, 1.6));
247|      wall.style.transform = 'scale(' + s + ') ' + tilt;
248|    } else {
249|      // 多页：舒适大小竖向滚动 + 强对角倾斜；transform-origin 跟随滚动→消除高墙 rotateZ 把远端行甩出屏幕

252|      wall.style.transform = 'rotateX(14deg) rotateZ(-7deg)';
253|      updateScrollOrigin();

255|    wall.querySelectorAll('.card .thumb').forEach(t => { const c = t.parentElement; if (c.clientWidth) t.style.transform = 'scale(' + (c.clientWidth / W) + ')'; });
256|  }
257|  function updateScrollOrigin() {
258|    if (document.body.getAttribute('data-grid') !== 'scroll') return;
259|    const ovg = document.getElementById('ov-grid');

263|  /* ════════ 无限画廊（洗牌不重复） ════════ */
264|  function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
265|  function shuffledRange(n, seed) { const rnd = mulberry32(seed); const a = Array.from({ length: n }, (_, i) => i); for (let i = n - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1)); const tmp = a[i]; a[i] = a[j]; a[j] = tmp; } return a; }

267|  function buildGallery() {
268|    const n = deck.length; if (!n) return;
269|    const vw = innerWidth, vh = innerHeight, gap = 18;
270|    const cardW = CARD_W, cardH = cardW * 9 / 16;
271|    const cellW = cardW + gap, cellH = cardH + gap;
272|    const visCols = Math.ceil(vw / cellW), visRows = Math.ceil(vh / cellH);
273|    // tile：宽够铺满；行数取「够铺满」与「装下全部 N 页」的较大者 → 看完所有页才重复
274|    const tileCols = visCols + 1;
275|    const tileRows = Math.max(visRows + 1, Math.ceil(n / tileCols));
276|    const tileCells = tileCols * tileRows;
277|    const perm = shuffledRange(n, 0x9e3779b9);        // 洗牌一次，打散规则感
278|    const tilePage = new Array(tileCells);
279|    for (let k = 0; k < tileCells; k++) tilePage[k] = perm[k % n];
280|
281|    const cols = tileCols * 2, rows = tileRows * 2;    // 2× tile 保证无缝漂移
282|    driftLayer.style.setProperty('--dx', (tileCols * cellW) + 'px');
283|    driftLayer.style.setProperty('--dy', (tileRows * cellH) + 'px');
284|    gallery.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cardW + 'px)';
285|    gallery.style.gridAutoRows = cardH + 'px';
286|    gallery.style.gap = gap + 'px';
287|    gallery.innerHTML = '';
288|    const scale = cardW / W;
289|    for (let r = 0; r < rows; r++) {
290|      for (let c = 0; c < cols; c++) {
291|        const idx = tilePage[(r % tileRows) * tileCols + (c % tileCols)];
292|        gallery.appendChild(makeCard(idx, scale, true));  // 画廊 = 图片缩略图（性能）
293|      }
294|    }
295|  }

299|    const s = Math.min(innerWidth / W, innerHeight / H);
300|    stage.style.transform = 'translate(' + ((innerWidth - W * s) / 2) + 'px, ' + ((innerHeight - H * s) / 2) + 'px) scale(' + s + ')';
301|    stage.style.top = '0'; stage.style.left = '0';
302|  }
303|  function show(idx) {
304|    if (idx < 0 || idx >= deck.length) return;
