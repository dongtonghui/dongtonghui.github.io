<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>AI赋能产品经理 · 现在就试试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }

.slide {
  width: 1920px; height: 1080px; position: relative;
  background: linear-gradient(175deg, #050810 0%, #0A1228 40%, #0E1A35 70%, #0A1228 100%);
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  overflow: hidden;
}

.grid-overlay {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,255,133,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,133,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

.glow-tl { position: absolute; top: -250px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(68,187,255,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.glow-br { position: absolute; bottom: -200px; right: -150px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,133,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }

.term-bar { position: absolute; top: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(0,255,133,0.12); display: flex; align-items: center; padding: 0 16px; }
.term-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; }
.term-dot:nth-child(1) { background: #FF5F56; }
.term-dot:nth-child(2) { background: #FFBD2E; }
.term-dot:nth-child(3) { background: #27C93F; }
.term-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.3); margin-left: 12px; }

.content { position: relative; z-index: 2; padding: 56px 72px 32px; height: 100%; display: flex; flex-direction: column; }

.breadcrumb { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(232,237,245,0.3); margin-bottom: 16px; }
.breadcrumb .active { color: rgba(0,255,133,0.5); }
.breadcrumb span { margin: 0 6px; }

.page-header { margin-bottom: 28px; }
.page-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(0,255,133,0.4); margin-bottom: 6px; letter-spacing: 2px; }
.page-title { font-size: 32px; font-weight: 700; color: #E8EDF5; letter-spacing: -0.3px; margin-bottom: 4px; }
.page-title .accent { color: #00FF85; }
.page-desc { font-size: 15px; color: rgba(232,237,245,0.45); font-weight: 300; }

.bottom-line { position: absolute; bottom: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.35); border-top: 1px solid rgba(0,255,133,0.08); display: flex; align-items: center; padding: 0 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.15); }
.bottom-line .cursor { display: inline-block; width: 7px; height: 14px; background: rgba(0,255,133,0.5); margin-left: 6px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.page-indicator { position: absolute; bottom: 40px; right: 40px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.1); letter-spacing: 1px; }

/* Thank you center section */
.thanks-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.thanks-title { font-size: 56px; font-weight: 900; color: #00FF85; margin-bottom: 8px; letter-spacing: -1px; }
.thanks-sub { font-size: 20px; color: rgba(232,237,245,0.4); font-weight: 300; margin-bottom: 48px; }

.term-actions { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; max-width: 700px; width: 100%; padding: 0 20px; }
.term-action { display: flex; align-items: center; gap: 16px; width: 100%; padding: 10px 18px; border: 1px solid rgba(0,255,133,0.08); border-radius: 6px; background: rgba(0,0,0,0.25); transition: all 0.2s; }
.term-action:hover { border-color: rgba(0,255,133,0.2); background: rgba(0,255,133,0.04); }
.term-prompt { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: rgba(0,255,133,0.5); flex-shrink: 0; }
.term-cmd { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #E8EDF5; }
.term-comment { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.2); margin-left: auto; flex-shrink: 0; }

.quote-block { margin-top: 40px; padding: 16px 28px; border-left: 3px solid rgba(0,255,133,0.2); max-width: 680px; }
.quote-text { font-size: 18px; color: rgba(232,237,245,0.5); font-weight: 300; line-height: 1.6; font-style: italic; }

.footer-text { margin-top: 36px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(0,255,133,0.25); }
.footer-text .cursor-end { display: inline-block; width: 7px; height: 14px; background: rgba(0,255,133,0.5); margin-left: 6px; animation: blink 1s step-end infinite; }
</style>
</head>
<body>
<div class="slide">
  <div class="grid-overlay"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="term-bar">
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-title">~/ai-pm — end</div>
  </div>

  <div class="content">
    <div class="breadcrumb">~/ai-pm ❯ <span class="active">end</span></div>

    <div class="page-header">
      <div class="page-num">Q&A</div>
      <div class="page-title">现在就<span class="accent">试试</span></div>
      <div class="page-desc">行动是最好的学习方式</div>
    </div>

    <div class="thanks-section">
      <div class="thanks-title">感谢聆听</div>
      <div class="thanks-sub">欢迎交流 · 保持迭代</div>

      <div class="term-actions">
        <div class="term-action">
          <span class="term-prompt">$</span>
          <span class="term-cmd">hermes setup</span>
          <span class="term-comment"># 安装你的AI Agent</span>
        </div>
        <div class="term-action">
          <span class="term-prompt">$</span>
          <span class="term-cmd">hermes skills install reddit-community-research</span>
          <span class="term-comment"># 安装首个技能</span>
        </div>
        <div class="term-action">
          <span class="term-prompt">$</span>
          <span class="term-cmd">hermes</span>
          <span class="term-comment"># 开始对话</span>
        </div>
      </div>

      <div class="quote-block">
        <div class="quote-text">「最贵的AI不是付费工具，而是你还没用上AI的时间。」</div>
      </div>

      <div class="footer-text">感谢聆听 · 欢迎交流<span class="cursor-end"></span></div>
    </div>
  </div>

  <div class="page-indicator">20</div>
  <div class="bottom-line">~/ai-pm $ exit --with-action<span class="cursor"></span></div>
</div>
</body>
</html>
