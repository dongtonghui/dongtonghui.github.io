<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>技能进化 · AI PM Empower</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
.slide { width: 1920px; height: 1080px; position: relative; background: linear-gradient(175deg, #050810 0%, #0A1228 40%, #0E1A35 70%, #0A1228 100%); font-family: 'Noto Sans SC', -apple-system, sans-serif; overflow: hidden; }
.grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,255,133,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,133,0.025) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
.glow-tl { position: absolute; top: -250px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(68,187,255,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.glow-br { position: absolute; bottom: -200px; right: -150px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,133,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.term-bar { position: absolute; top: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(0,255,133,0.12); display: flex; align-items: center; padding: 0 16px; }
.term-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; } .term-dot:nth-child(1) { background: #FF5F56; } .term-dot:nth-child(2) { background: #FFBD2E; } .term-dot:nth-child(3) { background: #27C93F; }
.term-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.3); margin-left: 12px; }
.content { position: relative; z-index: 2; padding: 56px 72px 32px; height: 100%; display: flex; flex-direction: column; }
.breadcrumb { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(232,237,245,0.3); margin-bottom: 16px; }
.breadcrumb .active { color: rgba(0,255,133,0.5); }
.breadcrumb span { margin: 0 6px; }
.page-header { margin-bottom: 28px; }
.page-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(0,255,133,0.4); margin-bottom: 6px; letter-spacing: 2px; }
.page-title { font-size: 32px; font-weight: 700; color: #E8EDF5; letter-spacing: -0.3px; margin-bottom: 4px; }
.page-title .accent { color: #00FF85; }
.page-desc { font-size: 15px; color: rgba(232,237,245,0.45); font-weight: 300; }
.bottom-line { position: absolute; bottom: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.35); border-top: 1px solid rgba(0,255,133,0.08); display: flex; align-items: center; padding: 0 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.15); }
.bottom-line .cursor { display: inline-block; width: 7px; height: 14px; background: rgba(0,255,133,0.5); margin-left: 6px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.page-indicator { position: absolute; bottom: 40px; right: 40px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.1); letter-spacing: 1px; }

/* Slide-specific */
.badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
.badge-green { background: rgba(0,255,133,0.12); color: #00FF85; border: 1px solid rgba(0,255,133,0.2); }
.badge-blue { background: rgba(68,187,255,0.12); color: #44BBFF; border: 1px solid rgba(68,187,255,0.2); }
.cycle-section { display: flex; gap: 28px; flex: 1; }
.cycle-diagram { flex: 1.4; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-content: center; }
.cycle-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 18px 16px; position: relative; }
.cycle-item .ci-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: rgba(0,255,133,0.15); position: absolute; top: 8px; right: 12px; }
.cycle-item .ci-icon { font-size: 24px; margin-bottom: 6px; }
.cycle-item .ci-title { font-size: 15px; font-weight: 600; color: #E8EDF5; margin-bottom: 4px; }
.cycle-item .ci-desc { font-size: 12px; color: rgba(232,237,245,0.5); line-height: 1.6; }
.cycle-item .ci-arrow { position: absolute; right: -18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(0,255,133,0.15); }
.cycle-item:nth-child(2) .ci-arrow { display: none; }
.cycle-sidebar { flex: 1; display: flex; flex-direction: column; gap: 14px; }
.compare-bar { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 16px 18px; display: flex; align-items: center; gap: 10px; }
.compare-bar .arrow-evo { color: #00FF85; font-size: 18px; font-family: 'JetBrains Mono', monospace; }
.compare-bar .state { font-size: 13px; color: rgba(232,237,245,0.6); }
.compare-bar .state.strong { color: #00FF85; font-weight: 600; }
.feature-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
</style>
</head>
<body>
<div class="slide">
  <div class="grid-overlay"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="term-bar">
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-title">zsh — ~/ai-pm/ch04 — 130×36</div>
  </div>
  <div class="content">
    <div class="breadcrumb">~/ai-pm/ch04 <span>❯</span> <span class="active">darwin</span></div>
    <div class="page-header">
      <div class="page-num">CHAPTER 04 · 进化</div>
      <div class="page-title">🤖 技能的 <span class="accent">进化</span></div>
      <div class="page-desc">Darwin 2.0 — 让你的AI越用越聪明</div>
    </div>
    <div class="cycle-section">
      <div class="cycle-diagram">
        <div class="cycle-item">
          <div class="ci-icon">🔍</div>
          <div class="ci-title">观察</div>
          <div class="ci-desc">记录用户行为和工作流</div>
          <span class="ci-arrow">↓</span>
          <div class="ci-num">01</div>
        </div>
        <div class="cycle-item">
          <div class="ci-icon">📝</div>
          <div class="ci-title">分析</div>
          <div class="ci-desc">识别可优化的技能知识</div>
          <span class="ci-arrow">↓</span>
          <div class="ci-num">02</div>
        </div>
        <div class="cycle-item">
          <div class="ci-icon">🔧</div>
          <div class="ci-title">优化</div>
          <div class="ci-desc">自动调整skill内容</div>
          <span class="ci-arrow">↓</span>
          <div class="ci-num">03</div>
        </div>
        <div class="cycle-item">
          <div class="ci-icon">✅</div>
          <div class="ci-title">验证</div>
          <div class="ci-desc">对比效果，确认提升</div>
          <div class="ci-num">04</div>
        </div>
      </div>
      <div class="cycle-sidebar">
        <div class="compare-bar">
          <span class="state">初始状态</span>
          <span class="arrow-evo">→</span>
          <span class="state">经过N次进化</span>
          <span class="arrow-evo">→</span>
          <span class="state strong">精准高效</span>
        </div>
        <div style="background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 14px 18px;">
          <div style="font-size: 13px; color: rgba(232,237,245,0.5); margin-bottom: 8px;">核心特性</div>
          <div class="feature-badges">
            <span class="badge badge-green">基于使用日志</span>
            <span class="badge badge-green">无需手动干预</span>
            <span class="badge badge-green">持续自迭代</span>
            <span class="badge badge-blue">效果可追踪</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="page-indicator">18</div>
  <div class="bottom-line">~/ai-pm $ darwin --status --evolution <span class="cursor"></span></div>
</div>
</body>
</html>
