<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>AI赋能产品经理 · 最佳实践</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }

.slide {
  width: 1920px; height: 1080px; position: relative;
  background: linear-gradient(175deg, #050810 0%, #0A1228 40%, #0E1A35 70%, #0A1228 100%);
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  overflow: hidden;
}

.grid-overlay {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,255,133,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,133,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

.glow-tl { position: absolute; top: -250px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(68,187,255,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.glow-br { position: absolute; bottom: -200px; right: -150px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,133,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }

.term-bar { position: absolute; top: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(0,255,133,0.12); display: flex; align-items: center; padding: 0 16px; }
.term-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; }
.term-dot:nth-child(1) { background: #FF5F56; }
.term-dot:nth-child(2) { background: #FFBD2E; }
.term-dot:nth-child(3) { background: #27C93F; }
.term-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.3); margin-left: 12px; }

.content { position: relative; z-index: 2; padding: 56px 72px 32px; height: 100%; display: flex; flex-direction: column; }

.breadcrumb { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(232,237,245,0.3); margin-bottom: 16px; }
.breadcrumb .active { color: rgba(0,255,133,0.5); }
.breadcrumb span { margin: 0 6px; }

.page-header { margin-bottom: 28px; }
.page-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(0,255,133,0.4); margin-bottom: 6px; letter-spacing: 2px; }
.page-title { font-size: 32px; font-weight: 700; color: #E8EDF5; letter-spacing: -0.3px; margin-bottom: 4px; }
.page-title .accent { color: #00FF85; }
.page-desc { font-size: 15px; color: rgba(232,237,245,0.45); font-weight: 300; }

.bottom-line { position: absolute; bottom: 0; left: 0; right: 0; height: 32px; z-index: 3; background: rgba(0,0,0,0.35); border-top: 1px solid rgba(0,255,133,0.08); display: flex; align-items: center; padding: 0 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.15); }
.bottom-line .cursor { display: inline-block; width: 7px; height: 14px; background: rgba(0,255,133,0.5); margin-left: 6px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.page-indicator { position: absolute; bottom: 40px; right: 40px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.1); letter-spacing: 1px; }

/* Flow diagram */
.flow-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.flow-row { display: flex; align-items: center; justify-content: center; gap: 0; max-width: 1700px; width: 100%; }
.flow-step { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; max-width: 320px; }
.flow-box { width: 200px; height: 200px; border: 1px solid rgba(0,255,133,0.12); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,255,133,0.03); transition: all 0.2s; }
.flow-box:hover { border-color: rgba(0,255,133,0.25); background: rgba(0,255,133,0.06); }
.flow-icon { font-size: 42px; margin-bottom: 10px; }
.flow-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #00FF85; font-weight: 500; }
.flow-desc { font-size: 13px; color: rgba(232,237,245,0.4); margin-top: 10px; line-height: 1.5; max-width: 240px; font-weight: 300; }

.flow-arrow { font-family: 'JetBrains Mono', monospace; font-size: 28px; color: rgba(0,255,133,0.15); flex-shrink: 0; width: 64px; text-align: center; }
.flow-arrow-line { position: relative; }
.flow-arrow-line::after { content: '──❯'; font-family: 'JetBrains Mono', monospace; font-size: 20px; letter-spacing: 4px; }

.meta-tag { position: absolute; bottom: -2px; right: -2px; }
</style>
</head>
<body>
<div class="slide">
  <div class="grid-overlay"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="term-bar">
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-dot"></div>
    <div class="term-title">~/ai-pm/ch04 — practice</div>
  </div>

  <div class="content">
    <div class="breadcrumb">~/ai-pm/ch04 ❯ <span class="active">practice</span></div>

    <div class="page-header">
      <div class="page-num">CHAPTER 04</div>
      <div class="page-title">最佳<span class="accent">实践</span></div>
      <div class="page-desc">真实场景 × Hermes技能 = 10倍效率</div>
    </div>

    <div class="flow-section">
      <div class="flow-row">
        <!-- Step 1 -->
        <div class="flow-step">
          <div class="flow-box">
            <div class="flow-icon">📊</div>
            <div class="flow-label">Reddit舆情</div>
          </div>
          <div class="flow-desc">自动抓取社区讨论，<br>提炼用户真实需求</div>
        </div>

        <div class="flow-arrow">── ❯</div>

        <!-- Step 2 -->
        <div class="flow-step">
          <div class="flow-box">
            <div class="flow-icon">📝</div>
            <div class="flow-label">PRD撰写</div>
          </div>
          <div class="flow-desc">AI辅助编写产品需求文档，<br>模块拆解+交叉评审</div>
        </div>

        <div class="flow-arrow">── ❯</div>

        <!-- Step 3 -->
        <div class="flow-step">
          <div class="flow-box">
            <div class="flow-icon">✏️</div>
            <div class="flow-label">文案Review</div>
          </div>
          <div class="flow-desc">多语言文案一键检查，<br>风格统一·用词精准</div>
        </div>

        <div class="flow-arrow">── ❯</div>

        <!-- Step 4 -->
        <div class="flow-step">
          <div class="flow-box">
            <div class="flow-icon">🤖</div>
            <div class="flow-label">Darwin进化</div>
          </div>
          <div class="flow-desc">技能链自我迭代，<br>AI自动优化工作流</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page-indicator">13</div>
  <div class="bottom-line">~/ai-pm $ practice --apply<span class="cursor"></span></div>
</div>
</body>
</html>
